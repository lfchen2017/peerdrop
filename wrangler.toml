name = "peerdrop"
main = "worker.js"
compatibility_date = "2026-06-05"

[[durable_objects.bindings]]
name = "TRANSFER"
class_name = "TransferSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TransferSession"]

